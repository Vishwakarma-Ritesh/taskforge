services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: taskforge_user
      POSTGRES_PASSWORD: taskforge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge_user -d taskforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./apps/backend
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: taskforge
      DB_USER: taskforge_user
      DB_PASSWORD: taskforge_password
      DB_CONNECT_TIMEOUT_SECONDS: "3"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: taskforge
      DB_USER: taskforge_user
      DB_PASSWORD: taskforge_password
      DB_CONNECT_TIMEOUT_SECONDS: "3"
      POLL_INTERVAL_SECONDS: "10"
      WORKER_BATCH_SIZE: "5"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres-data:
