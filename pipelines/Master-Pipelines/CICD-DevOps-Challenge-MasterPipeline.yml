trigger:
  branches:
    include:
      - main

variables:
  pythonVersion: "3.12"
  namespace: "devops-challenge"
  backendImageRepository: "your-dockerhub-user/taskforge-backend"
  workerImageRepository: "your-dockerhub-user/taskforge-worker"
  dockerRegistryServiceConnection: "dockerhub-service-connection"
  imageTag: "$(Build.BuildId)"

stages:
  - stage: Build_Test
    displayName: Install Dependencies and Run Tests
    jobs:
      - job: Test_All_Services
        displayName: Backend and worker quality gate
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
          - script: |
              python -m pip install --upgrade pip
              pip install -r apps/backend/requirements.txt
              pip install -r apps/worker/requirements.txt
              ruff check apps/backend/src apps/worker/src
              pytest apps/backend/src/tests apps/worker/src/tests
            displayName: Install dependencies, lint, and test
          - task: KubectlInstaller@0
            inputs:
              kubectlVersion: latest
          - script: |
              kubectl apply --dry-run=client --validate=false -f infra/k8s/
            displayName: Validate raw Kubernetes manifests

  - stage: Package
    displayName: Build and Push Docker Images
    dependsOn: Build_Test
    jobs:
      - job: Docker_Build_Push
        displayName: Package backend and worker
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: Docker@2
            displayName: Docker registry login
            inputs:
              command: login
              containerRegistry: "$(dockerRegistryServiceConnection)"
          - script: |
              docker build -t $(backendImageRepository):$(imageTag) apps/backend
              docker build -t $(backendImageRepository):latest apps/backend
              docker build -t $(workerImageRepository):$(imageTag) apps/worker
              docker build -t $(workerImageRepository):latest apps/worker
              docker push $(backendImageRepository):$(imageTag)
              docker push $(backendImageRepository):latest
              docker push $(workerImageRepository):$(imageTag)
              docker push $(workerImageRepository):latest
            displayName: Build and push application images

  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Package
    jobs:
      - job: Kubectl_Apply
        displayName: Apply raw manifests and update images
        pool:
          name: SelfHosted-Kind
        steps:
          - checkout: self
          - script: |
              kubectl apply -f infra/k8s/
              kubectl -n $(namespace) set image deployment/backend backend=$(backendImageRepository):$(imageTag)
              kubectl -n $(namespace) set image deployment/worker worker=$(workerImageRepository):$(imageTag)
              kubectl -n $(namespace) rollout status deployment/postgres --timeout=180s
              kubectl -n $(namespace) rollout status deployment/backend --timeout=180s
              kubectl -n $(namespace) rollout status deployment/worker --timeout=180s
            displayName: Deploy application stack

  - stage: Verify
    displayName: Verify Deployment
    dependsOn: Deploy
    jobs:
      - job: Runtime_Verification
        displayName: Kubernetes and HTTP verification
        pool:
          name: SelfHosted-Kind
        steps:
          - checkout: self
          - script: |
              kubectl -n $(namespace) get pods -o wide
              kubectl -n $(namespace) get svc
              kubectl -n $(namespace) get ingress
              kubectl -n $(namespace) rollout status deployment/backend --timeout=120s
              curl -fsS http://127.0.0.1:8080/health
              curl -fsS http://127.0.0.1:8080/ready
            displayName: Verify Kubernetes rollout and health endpoints
