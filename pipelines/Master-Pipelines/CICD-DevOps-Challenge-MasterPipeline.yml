trigger:
  branches:
    include:
      - main

variables:
  pythonVersion: "3.12"
  namespace: "devops-challenge"
  kindClusterName: "taskforge"
  backendImageRepository: "taskforge/backend"
  workerImageRepository: "taskforge/worker"
  imageTag: "v1"

stages:
  - stage: Build_Test
    displayName: Install Dependencies and Run Tests
    jobs:
      - job: Test_All_Services
        displayName: Backend and worker quality gate
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              python3 -m pip install --upgrade pip
              pip3 install -r apps/backend/requirements.txt
              pip3 install -r apps/worker/requirements.txt
              ruff check apps/backend/src apps/worker/src
              pytest apps/backend/src/tests apps/worker/src/tests
            displayName: Install dependencies, lint, and test

          - script: |
              kubectl apply --dry-run=client --validate=false -f infra/k8s/
            displayName: Validate raw Kubernetes manifests

  - stage: Package
    displayName: Build Docker Images
    dependsOn: Build_Test
    jobs:
      - job: Docker_Build
        displayName: Package backend and worker images locally
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              docker build -t $(backendImageRepository):$(imageTag) apps/backend
              docker build -t $(workerImageRepository):$(imageTag) apps/worker
            displayName: Build application images

  - stage: Deploy
    displayName: Deploy to Kind Kubernetes
    dependsOn: Package
    jobs:
      - job: Kubectl_Apply
        displayName: Load images and apply raw manifests
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              kind load docker-image $(backendImageRepository):$(imageTag) --name $(kindClusterName)
              kind load docker-image $(workerImageRepository):$(imageTag) --name $(kindClusterName)
            displayName: Load images into Kind

          - script: |
              kubectl apply -f infra/k8s/namespace.yaml
              kubectl apply -f infra/k8s/configmap.yaml
              kubectl apply -f infra/k8s/secret.yaml
              kubectl apply -f infra/k8s/postgres.yaml
              kubectl apply -f infra/k8s/backend-deployment.yaml
              kubectl apply -f infra/k8s/backend-service.yaml
              kubectl apply -f infra/k8s/worker-deployment.yaml
              kubectl apply -f infra/k8s/worker-service.yaml
              kubectl apply -f infra/k8s/ingress.yaml

              kubectl -n $(namespace) rollout restart deployment/backend
              kubectl -n $(namespace) rollout restart deployment/worker

              kubectl -n $(namespace) rollout status deployment/postgres --timeout=180s
              kubectl -n $(namespace) rollout status deployment/backend --timeout=180s
              kubectl -n $(namespace) rollout status deployment/worker --timeout=180s
            displayName: Deploy application stack

  - stage: Verify
    displayName: Verify Deployment
    dependsOn: Deploy
    jobs:
      - job: Runtime_Verification
        displayName: Kubernetes and HTTP verification
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              kubectl -n $(namespace) get pods -o wide
              kubectl -n $(namespace) get svc
              kubectl -n $(namespace) get ingress
              kubectl -n $(namespace) rollout status deployment/backend --timeout=120s
            displayName: Verify Kubernetes rollout