trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/backend/**
      - pipelines/Service-CI/CI-Backend-Pipeline.yml

variables:
  pythonVersion: "3.12"
  imageRepository: "your-dockerhub-user/taskforge-backend"
  imageTag: "$(Build.BuildId)"
  dockerRegistryServiceConnection: "dockerhub-service-connection"

stages:
  - stage: Backend_CI
    displayName: Build, Test, Package Backend
    jobs:
      - job: Build_Test_Push
        displayName: Backend CI
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -r apps/backend/requirements.txt
              ruff check apps/backend/src
              pytest apps/backend/src/tests
            displayName: Install dependencies, lint, and test backend

          - task: Docker@2
            displayName: Login to registry
            inputs:
              command: login
              containerRegistry: "$(dockerRegistryServiceConnection)"

          - script: |
              docker build -t $(imageRepository):$(imageTag) apps/backend
              docker build -t $(imageRepository):latest apps/backend
              docker push $(imageRepository):$(imageTag)
              docker push $(imageRepository):latest
            displayName: Build and push backend Docker image
