trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/backend/**
      - pipelines/Service-CI/CI-Backend-Pipeline.yml

variables:
  pythonVersion: "3.12"
  imageRepository: "taskforge/backend"
  imageTag: "v1"

stages:
  - stage: Backend_CI
    displayName: Build, Test, Package Backend
    jobs:
      - job: Build_Test_Package
        displayName: Backend CI
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              python3 -m pip install --upgrade pip
              pip3 install -r apps/backend/requirements.txt
              ruff check apps/backend/src
              pytest apps/backend/src/tests
            displayName: Install dependencies, lint, and test backend

          - script: |
              docker build -t $(imageRepository):$(imageTag) apps/backend
            displayName: Build backend Docker image