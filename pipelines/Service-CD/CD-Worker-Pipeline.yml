trigger: none

parameters:
  - name: imageTag
    displayName: Worker image tag
    type: string
    default: v1

variables:
  namespace: "devops-challenge"
  kindClusterName: "taskforge"
  imageRepository: "taskforge/worker"

stages:
  - stage: Worker_CD
    displayName: Deploy Worker to Kubernetes
    jobs:
      - job: Deploy_Worker
        displayName: Load worker image, apply raw YAML, and verify worker
        pool:
          name: taskforge-local-pool
        steps:
          - checkout: self

          - script: |
              kind load docker-image $(imageRepository):${{ parameters.imageTag }} --name $(kindClusterName)

              kubectl apply -f infra/k8s/namespace.yaml
              kubectl apply -f infra/k8s/configmap.yaml
              kubectl apply -f infra/k8s/secret.yaml
              kubectl apply -f infra/k8s/postgres.yaml
              kubectl apply -f infra/k8s/worker-deployment.yaml
              kubectl apply -f infra/k8s/worker-service.yaml

              kubectl -n $(namespace) rollout restart deployment/worker
              kubectl -n $(namespace) rollout status deployment/postgres --timeout=180s
              kubectl -n $(namespace) rollout status deployment/worker --timeout=180s
            displayName: Deploy worker

          - script: |
              kubectl -n $(namespace) get pods -o wide
              kubectl -n $(namespace) get svc
              kubectl -n $(namespace) logs deployment/worker --tail=50
            displayName: Verify worker deployment